# Continuous integration for pull requests and the default branch.
# Practices: least-privilege permissions, concurrency cancellation, reproducible
# installs (--frozen), fail-fast lint before expensive test install, container build smoke test.

name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# `setup-uv` (enable-cache) and Docker Buildx `type=gha` need Actions cache read/write.
# With only `contents: read`, unset scopes default to none and cache steps fail the job.
permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: bash

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Ruff check
        run: uvx ruff@0.9.10 check dags tests

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -vv --tb=short --strict-markers
        env:
          PYTHONWARNINGS: default

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: sales-project:ci
          target: api-runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max
